# Evaluation scenarios for the multi-agent IT help desk system.
#
# Seed data reference:
#   Agents:    1=Alice Chen (network), 2=Bob Martinez (software), 3=Carol Singh (hardware),
#              4=David Kim (security), 5=Eva Johansson (network, unavailable),
#              6=Frank Okafor (software), 7=Grace Lee (hardware), 8=Henry Patel (security)
#   Customers: 1=James Wilson (Engineering), 2=Sarah Thompson (Marketing),
#              3=Michael Brown (Finance), 4=Emily Davis (HR), 6=Jennifer Martinez (Engineering),
#              11=Daniel Jackson (Engineering), 12=Ashley Harris (HR), 13=Matthew Lewis (Sales)
#   Notable tickets:
#              4=VPN gateway failure (critical, in_progress)
#              8=SSL certificate expired (high, open)
#              14=Password reset (medium, resolved)
#              19=macOS update breaking dev tools (medium, in_progress)
#              24=Backup job failing nightly (medium, in_progress)
#   KB articles: VPN, Password Reset, Workstation Setup, Printer Offline,
#                Ransomware, Wi-Fi, SSL Certificate, macOS Dev Tools,
#                Storage Management, Access Request Workflow

# ---------------------------------------------------------------------------
# Happy-path KB resolution (Triage only)
# ---------------------------------------------------------------------------

- id: sc-001
  description: VPN client not connecting — KB self-service resolution
  tags: [happy-path, kb-resolution, network]
  request: >
    My VPN client is showing a connection error and I can't reach any internal systems.
    I've already tried restarting my computer. Customer name: Jennifer Martinez, customer_id 6.
  expected_intent: resolved
  expected_agents: [triage]
  expected_tools: [search_knowledge_base]
  forbidden_tools: [assign_ticket]
  max_hops: 2
  judge_criteria: >
    The response must provide concrete VPN troubleshooting steps from the knowledge base
    (e.g., checking VPN client version, clearing cache, reinstall steps). It must not just
    say "I'll look into this" — it must deliver the actual self-service solution.

